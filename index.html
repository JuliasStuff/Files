<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1f6feb">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Files">
  <title>Files</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="icon" type="image/png" href="icon.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <h1>Files</h1>
    <button id="add" class="icon-btn" aria-label="Add file">
      <svg viewBox="0 0 24 24" width="26" height="26" aria-hidden="true">
        <path fill="currentColor" d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6z"/>
      </svg>
    </button>
  </header>

  <main>
    <div id="grid" class="grid" aria-live="polite"></div>
    <p id="empty" class="empty hidden">
      No files yet.<br>
      Tap <span class="inline-plus" aria-hidden="true">+</span> to add a JPG, PNG, or PDF.
    </p>
  </main>

  <input id="picker" type="file" accept="image/jpeg,image/jpg,image/png,application/pdf" multiple hidden>

  <!-- Fullscreen viewer -->
  <div id="viewer" class="viewer hidden" role="dialog" aria-modal="true" aria-label="File viewer">
    <button id="viewer-close" class="viewer-btn close" aria-label="Close">
      <svg viewBox="0 0 24 24" width="28" height="28" aria-hidden="true">
        <path fill="currentColor" d="M18.3 5.71 12 12.01l-6.29-6.3-1.42 1.42L10.59 13.43l-6.3 6.29 1.42 1.42L12 14.84l6.29 6.3 1.42-1.42-6.3-6.29 6.3-6.29z"/>
      </svg>
    </button>
    <button id="viewer-delete" class="viewer-btn delete" aria-label="Delete file">
      <svg viewBox="0 0 24 24" width="26" height="26" aria-hidden="true">
        <path fill="currentColor" d="M6 19a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V7H6zM19 4h-3.5l-1-1h-5l-1 1H5v2h14z"/>
      </svg>
    </button>
    <button id="viewer-rotate-ccw" class="viewer-btn rotate-ccw" aria-label="Rotate left">
      <svg viewBox="0 0 24 24" width="26" height="26" aria-hidden="true">
        <path fill="currentColor" d="M7.11 8.53 5.7 7.11C4.8 8.27 4.24 9.61 4.07 11h2.02c.14-.87.49-1.72 1.02-2.47zM6.09 13H4.07c.17 1.39.72 2.73 1.62 3.89l1.41-1.42c-.52-.75-.87-1.59-1.01-2.47zm1.01 5.32c1.16.9 2.51 1.44 3.9 1.61V17.9c-.87-.15-1.71-.49-2.46-1.03zM13 4.07V1L8.45 5.55 13 10V6.09c2.84.48 5 2.94 5 5.91s-2.16 5.43-5 5.91v2.02c3.95-.49 7-3.85 7-7.93s-3.05-7.44-7-7.93"/>
      </svg>
    </button>
    <button id="viewer-rotate-cw" class="viewer-btn rotate-cw" aria-label="Rotate right">
      <svg viewBox="0 0 24 24" width="26" height="26" aria-hidden="true">
        <path fill="currentColor" d="M15.55 5.55 11 1v3.07C7.06 4.56 4 7.92 4 12s3.05 7.44 7 7.93v-2.02c-2.84-.48-5-2.94-5-5.91s2.16-5.43 5-5.91V10zM19.93 11a7.9 7.9 0 0 0-1.62-3.89l-1.42 1.42c.54.75.88 1.6 1.02 2.47zM13 17.9v2.02c1.39-.17 2.74-.71 3.9-1.61l-1.44-1.44c-.75.54-1.59.89-2.46 1.03m3.89-2.42 1.42 1.41c.9-1.16 1.45-2.5 1.62-3.89h-2.02c-.14.88-.48 1.72-1.02 2.48"/>
      </svg>
    </button>
    <div id="viewer-body" class="viewer-body"></div>
    <div id="viewer-name" class="viewer-name"></div>
  </div>

  <!-- Lightweight confirm dialog -->
  <div id="confirm" class="confirm hidden" role="alertdialog" aria-modal="true" aria-labelledby="confirm-msg">
    <div class="confirm-box">
      <div id="confirm-msg" class="confirm-msg">Delete this file?</div>
      <div class="confirm-actions">
        <button id="confirm-cancel" class="btn">Cancel</button>
        <button id="confirm-ok" class="btn danger">Delete</button>
      </div>
    </div>
  </div>

  <script src="app.js" defer></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
    }
  </script>
</body>
</html>
