<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b8bff"/>
      <stop offset="100%" stop-color="#1f6feb"/>
    </linearGradient>
    <linearGradient id="folderBack" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe79a"/>
      <stop offset="100%" stop-color="#f5c042"/>
    </linearGradient>
    <linearGradient id="folderFront" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd35c"/>
      <stop offset="100%" stop-color="#e9a611"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dy="6" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- App background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Folder, centered and sized to fit the maskable safe zone -->
  <g filter="url(#softShadow)" transform="translate(95 137) scale(0.875)">
    <!-- Back flap (tab) -->
    <path
      d="M16 24
         q0-16 16-16
         h104
         q10 0 17 7
         l24 24
         h167
         q16 0 16 16
         v34
         H16
         z"
      fill="url(#folderBack)"/>

    <!-- Front pocket -->
    <path
      d="M8 76
         q0-16 16-16
         h312
         q16 0 16 16
         v172
         q0 16-16 16
         H24
         q-16 0-16-16
         z"
      fill="url(#folderFront)"/>

    <!-- Subtle highlight along the top edge of the front pocket -->
    <path
      d="M8 78
         q0-14 16-14
         h312
         q16 0 16 14"
      fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="3"/>
  </g>
</svg>
