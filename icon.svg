<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b8bff"/>
      <stop offset="100%" stop-color="#1f6feb"/>
    </linearGradient>
    <linearGradient id="folderBack" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe79a"/>
      <stop offset="100%" stop-color="#f5c042"/>
    </linearGradient>
    <linearGradient id="folderFront" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd35c"/>
      <stop offset="100%" stop-color="#e9a611"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dy="6" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- App background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Folder, centered. Back and front share identical L/R edges (x=8 to x=352). -->
  <g filter="url(#softShadow)" transform="translate(80 124) scale(1)">
    <!-- Back flap: full-width body with a symmetric centered tab on top.
         Tab is centered at x=180 (folder midpoint = (8+352)/2). -->
    <path
      d="M8 76
         q0-16 16-16
         h104
         q10 0 14-8
         l8-12
         q4-4 12-4
         h36
         q8 0 12 4
         l8 12
         q4 8 14 8
         h104
         q16 0 16 16
         v44
         H8
         z"
      fill="url(#folderBack)"/>

    <!-- Front pocket: identical left/right edges to the back -->
    <path
      d="M8 96
         q0-16 16-16
         h312
         q16 0 16 16
         v152
         q0 16-16 16
         H24
         q-16 0-16-16
         z"
      fill="url(#folderFront)"/>

    <!-- Subtle highlight along the top edge of the front pocket -->
    <path
      d="M8 98
         q0-14 16-14
         h312
         q16 0 16 14"
      fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="3"/>
  </g>
</svg>
